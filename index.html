// ── Token resolution ─────────────────────────────────────────────
function resolveToken(){
  const params=new URLSearchParams(window.location.search);
  const urlToken=params.get("u");
  if(urlToken){localStorage.setItem("pr:token",urlToken);return urlToken;}
  return localStorage.getItem("pr:token")||null;
}
const USER_TOKEN=resolveToken();

// ── Offline sync queue ───────────────────────────────────────────
const SYNC_QUEUE_KEY = 'pr:syncqueue';
function lsGet(key){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):null; }catch(e){ return null; } }
function lsSet(key,value){ try{ localStorage.setItem(key,JSON.stringify(value)); }catch(e){} }
function cacheWrite(key,value){ lsSet('pr:cache:'+key,{v:value,ts:Date.now()}); }
function cacheRead(key){ const d=lsGet('pr:cache:'+key); return d?d.v:null; }
function queueWrite(key,value){
  const q=lsGet(SYNC_QUEUE_KEY)||[];
  const idx=q.findIndex(e=>e.key===key);
  if(idx!==-1)q.splice(idx,1);
  q.push({key,value,ts:Date.now()});
  lsSet(SYNC_QUEUE_KEY,q);
}
async function flushSyncQueue(){
  const q=lsGet(SYNC_QUEUE_KEY)||[];
  if(!q.length)return;
  const failed=[];
  for(const entry of q){
    try{
      await sbSetRemote(entry.key,entry.value);
    }catch(e){
      failed.push(entry);
    }
  }
  lsSet(SYNC_QUEUE_KEY,failed);
}

// ── Supabase KV helpers ──────────────────────────────────────────
async function sbGet(key){
  if(!USER_TOKEN)return null;
  if(!navigator.onLine){
    return cacheRead(key);
  }
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/data?user_token=eq.${encodeURIComponent(USER_TOKEN)}&key=eq.${encodeURIComponent(key)}&select=value`,{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}});
    if(!res.ok)return cacheRead(key);
    const rows=await res.json();
    const value=rows.length?rows[0].value:null;
    if(value!==null)cacheWrite(key,value);
    return value;
  }catch(e){
    return cacheRead(key);
  }
}
async function sbSetRemote(key,value){
  await fetch(`${SUPA_URL}/rest/v1/data`,{method:"POST",headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},body:JSON.stringify({user_token:USER_TOKEN,key,value,updated_at:new Date().toISOString()})});
}
async function sbSet(key,value){
  if(!USER_TOKEN)return;
  cacheWrite(key,value);
  if(!navigator.onLine){
    queueWrite(key,value);
    return;
  }
  try{
    await sbSetRemote(key,value);
    const q=lsGet(SYNC_QUEUE_KEY)||[];
    const filtered=q.filter(e=>e.key!==key);
    lsSet(SYNC_QUEUE_KEY,filtered);
  }catch(e){
    queueWrite(key,value);
  }
}
async function sbGetAllDayKeys(prefix){
  if(!USER_TOKEN)return[];
  if(!navigator.onLine){
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('pr:cache:'+prefix)){
        const realKey=k.replace('pr:cache:','');
        const val=cacheRead(realKey);
        if(val!==null)keys.push({key:realKey,value:val});
      }
    }
    return keys.sort((a,b)=>b.key.localeCompare(a.key));
  }
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/data?user_token=eq.${encodeURIComponent(USER_TOKEN)}&key=like.${encodeURIComponent(prefix+'*')}&select=key,value&order=key.desc`,{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}});
    if(!res.ok)return[];
    const rows=await res.json();
    rows.forEach(r=>cacheWrite(r.key,r.value));
    return rows;
  }catch(e){
    return[];
  }
}

const startOfTodayTs=()=>{const d=new Date();d.setHours(0,0,0,0);return d.getTime();};
const todayOnlyTs=arr=>[...new Set((arr||[]).filter(t=>t>=startOfTodayTs()))].sort((a,b)=>a-b);
const cleanMapToday=m=>{const o={};for(const k in (m||{}))o[k]=todayOnlyTs(m[k]);return o;};

function fmtTime(ts){return new Date(ts).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function formatDayHeader(str){const[y,m,d]=str.split("-").map(Number);const dt=new Date(y,m-1,d);return{weekday:dt.toLocaleDateString("en-US",{weekday:"long"}),date:dt.toLocaleDateString("en-US",{month:"long",day:"numeric"})};}
function formatShort(str){const[y,m,d]=str.split("-").map(Number);return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function formatFull(str){const[y,m,d]=str.split("-").map(Number);return new Date(y,m-1,d).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});}
function getLast30Days(){return Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");});}
function addDays(str,n){const[y,m,d]=str.split("-").map(Number);const dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+n);return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}

async function searchDrugs(query){
  if(!query||query.length<2)return[];
  try{
    const q=encodeURIComponent(query);
    const res=await fetch("https://api.fda.gov/drug/label.json?search=openfda.brand_name:"+q+"*+OR+openfda.generic_name:"+q+"*&limit=10");
    if(!res.ok)return[];
    const data=await res.json();
    const results=[],seen=new Set();
    function toTitle(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():"";}
    for(const r of (data.results||[])){
      const brands=r.openfda?.brand_name||[],generics=r.openfda?.generic_name||[];
      for(const name of brands){const k=name.toLowerCase();if(!seen.has(k)){seen.add(k);results.push({name:toTitle(name),sub:generics[0]?toTitle(generics[0]):""});}}
      for(const name of generics){const k=name.toLowerCase();if(!seen.has(k)){seen.add(k);results.push({name:toTitle(name),sub:brands[0]?"Brand: "+toTitle(brands[0]):"Generic"});}}
      if(results.length>=8)break;
    }
    return results.slice(0,8);
  }catch{return[];}
}

function BottomSheet({onClose,children}){
  const sheetRef=useRef(null);
  const dragY=useRef(0),startX=useRef(0),startY=useRef(0),isDragging=useRef(null);
  function onTouchStart(e){const el=sheetRef.current;if(!el||el.scrollTop>0)return;const target=e.target;const scrollableX=target.closest("[data-scroll-x]");if(scrollableX){isDragging.current=false;return;}startY.current=e.touches[0].clientY;dragY.current=0;isDragging.current=true;}
  function onTouchMove(e){if(!isDragging.current)return;const el=sheetRef.current;if(!el||el.scrollTop>0){isDragging.current=false;return;}const dy=e.touches[0].clientY-startY.current;if(dy<0){isDragging.current=false;return;}dragY.current=dy;el.style.transform="translateY("+dy+"px)";el.style.transition="none";}
  function onTouchEnd(){if(!isDragging.current)return;isDragging.current=false;const el=sheetRef.current;if(!el)return;if(dragY.current>80){el.style.transition="transform 0.28s cubic-bezier(0.32,0.72,0,1)";el.style.transform="translateY(100%)";setTimeout(onClose,280);}else{el.style.transition="transform 0.22s cubic-bezier(0.22,1,0.36,1)";el.style.transform="translateY(0)";}}
  return ReactDOM.createPortal(<>
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1100,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(2px)",WebkitBackdropFilter:"blur(2px)"}}/>
    <div ref={el=>{sheetRef.current=el;if(el){el.scrollTop=0;requestAnimationFrame(()=>{el.scrollTop=0;});}}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      style={{position:"fixed",bottom:0,left:0,right:0,zIndex:1101,background:"var(--card)",borderRadius:"20px 20px 0 0",boxShadow:"0 -4px 32px rgba(0,0,0,0.18)",paddingBottom:"env(safe-area-inset-bottom,24px)",maxHeight:"82vh",overflowY:"auto",animation:"sheetUp 0.28s cubic-bezier(0.32,0.72,0,1)",willChange:"transform"}}>
      <div style={{display:"flex",justifyContent:"center",paddingTop:12,paddingBottom:8,cursor:"grab"}}>
        <div style={{width:36,height:4,borderRadius:2,background:"var(--sep)"}}/>
      </div>
      {children}
    </div>
  </>,document.body);
}

function PillForm({initial,accent,onSave,onCancel,submitLabel="Add",defaultSession="morning",noAutoFocus=false}){
  const [name,setName]=useState(initial?.name||"");
  const [shape,setShape]=useState(initial?.shape||"capsule");
  const [ongoing,setOngoing]=useState(initial?.durationDays==null);
  const [durationDays,setDurationDays]=useState(initial?.durationDays||7);
  const [startDate,setStartDate]=useState(initial?.startDate||todayStr());
  const [asNeeded,setAsNeeded]=useState(initial?.asNeeded!=null?initial.asNeeded:false);
  const [maxDailyDose,setMaxDailyDose]=useState(initial?.maxDailyDose||3);
  const [minIntervalHours,setMinIntervalHours]=useState(initial?.minIntervalHours||4);
  const [schedules,setSchedules]=useState(()=>{
    if(initial?.schedules)return initial.schedules;
    const sess=initial?.sessions||(initial?.session&&initial.session!=="as_needed"?[initial.session]:[defaultSession||"morning"]);
    const timings=initial?.timings||(initial?.timing?[initial.timing]:[]);
    return sess.map((s,i)=>({session:s,timing:timings[i]||""}));
  });
  function parseDose(d){const m=(d||"").match(/^(\d+(?:\.\d+)?)\s*(.*)$/);if(m)return{amt:Number(m[1])||10,unit:m[2].trim()||"mg",qty:1};return{amt:10,unit:"mg",qty:1};}
  const parsed=parseDose(initial?.dose);
  const [dosageAmt,setDosageAmt]=useState(initial?.dosageAmt||parsed.amt);
  const [dosageUnit,setDosageUnit]=useState(initial?.dosageUnit||parsed.unit||"mg");
  const [quantity,setQuantity]=useState(initial?.quantity||parsed.qty||1);
  const [suggestions,setSuggestions]=useState([]);
  const [showSuggestions,setShowSuggestions]=useState(false);
  const [scanLoading,setScanLoading]=useState(false);
  const searchTimer=useRef(null);
  const imageInputRef=useRef(null);
  function handleNameChange(val){setName(val);setShowSuggestions(true);clearTimeout(searchTimer.current);if(val.length<2){setSuggestions([]);return;}searchTimer.current=setTimeout(async()=>{const res=await searchDrugs(val);setSuggestions(res);},300);}
  function pickSuggestion(s){setName(s.name);setSuggestions([]);setShowSuggestions(false);}
  async function handleScanLabel(e){
    const file=e.target.files?.[0];
    if(!file)return;
    setScanLoading(true);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const fetchRes=await fetch("https://fotzkqkghxndjnomrspr.supabase.co/functions/v1/nurse-chat",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZvdHprcWtnaHhuZGpub21yc3ByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4MTg0MTMsImV4cCI6MjA5NjM5NDQxM30.o8AyVFlhd_g0NbdB1hd28x8ERxmCO4OjXPuwVoCJano"},body:JSON.stringify({system:"",messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"This is a pharmacy label or medication packaging. It may be in French or English. Extract ALL dosing schedules and respond ONLY with a valid JSON array — never a single object, always an array. One array element per daily intake time. Fields per element: name (string), dosageAmt (number or null), dosageUnit (string or null), quantity (number, default 1), session (MUST be one of: morning/lunch/evening — map dejeuner/matin/morn to morning, diner/midi/lunch to lunch, coucher/soir/evening/bedtime to evening), timing (one of with_meal/before_meal/after_meal or null), durationDays (number or null — convert months to days: 3 mois = 90), ongoing (boolean). CRITICAL: if label says 2 times per day or 2 fois par jour, you MUST return exactly 2 objects in the array. If 3 times, return 3 objects. Never merge multiple intake times into one object."}]}]})});
      const data=await fetchRes.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"";
      console.log("SCAN RAW TEXT:",text);
      const rawParsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      console.log("SCAN PARSED:",JSON.stringify(rawParsed));
      const entries=Array.isArray(rawParsed)?rawParsed:[rawParsed];
      console.log("SCAN ENTRIES COUNT:",entries.length);
      if(entries.length===1){
        const p=entries[0];
        if(p.name)setName(p.name);
        if(p.dosageAmt)setDosageAmt(Number(p.dosageAmt));
        if(p.dosageUnit)setDosageUnit(p.dosageUnit);
        if(p.quantity)setQuantity(Number(p.quantity));
        if(p.session)setSchedules([{session:p.session,timing:p.timing||""}]);
        if(p.durationDays){setDurationDays(Number(p.durationDays));setOngoing(false);}
        else if(p.ongoing)setOngoing(true);
      } else {
        // Multiple intakes: save each as a separate pill entry
        for(const p of entries){
          if(!p.name)continue;
          const dose=(p.quantity||1)+" x "+(p.dosageAmt||"")+( p.dosageUnit||"");
          const sess=p.session||"morning";
          const scheduleEntry=[{session:sess,timing:p.timing||""}];
          const dur=p.durationDays?Number(p.durationDays):null;
          onSave({name:p.name.trim(),dose,dosageAmt:p.dosageAmt,dosageUnit:p.dosageUnit,quantity:p.quantity||1,shape:"capsule",schedules:scheduleEntry,sessions:[sess],startDate:new Date().toISOString().slice(0,10),durationDays:dur,asNeeded:false,maxDailyDose:null,minIntervalHours:null});
        }
      }
    }catch(err){console.error("Scan error",err);alert("Scan failed — please fill in manually.");}
    finally{setScanLoading(false);if(imageInputRef.current)imageInputRef.current.value="";}
  }
  function handleSave(){
    if(!name.trim())return;
    const dose=quantity+" x "+dosageAmt+dosageUnit;
    const sessions=asNeeded?["as_needed"]:schedules.map(s=>s.session);
    onSave({name:name.trim(),dose,dosageAmt,dosageUnit,quantity,shape,schedules:asNeeded?[]:schedules,sessions,startDate,durationDays:ongoing?null:Number(durationDays),asNeeded,maxDailyDose:asNeeded?Number(maxDailyDose):null,minIntervalHours:asNeeded?Number(minIntervalHours):null});
  }
  const stepBtn=(onClick,label)=>(<button onClick={onClick} style={{width:28,height:28,borderRadius:8,background:"var(--acc-soft)",border:"none",color:"var(--acc)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{label}</button>);
  return(
    <div style={{padding:"16px 16px 8px",background:"var(--card2)"}}>
      <input ref={imageInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleScanLabel}/>
      <button onClick={()=>imageInputRef.current?.click()} disabled={scanLoading} style={{width:"100%",marginBottom:16,padding:"11px 14px",borderRadius:12,border:"none",background:"var(--acc-soft)",color:"var(--acc)",fontSize:15,fontWeight:600,cursor:scanLoading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:scanLoading?0.6:1}}>
        {scanLoading?"Analyse en cours…":"Scanner l'ordonnance"}
      </button>
      <div style={{position:"relative",marginBottom:16}}>
        <input autoFocus={!noAutoFocus} placeholder="Medicine name" value={name}
          onChange={e=>handleNameChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()}
          onFocus={()=>suggestions.length>0&&setShowSuggestions(true)}
          style={{width:"100%",padding:"11px 14px",borderRadius:12,border:"none",background:"var(--card)",color:"var(--t1)",fontSize:16,display:"block",boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}/>
        {showSuggestions&&suggestions.length>0&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"var(--card)",borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",zIndex:200,overflow:"hidden"}}>
            {suggestions.map((s,i)=>(

      )}

      {ReactDOM.createPortal(<React.Fragment>
      {showDown&&(<button onClick={()=>bottomRef.current?.scrollIntoView({behavior:"smooth"})} aria-label="Scroll to latest" style={{position:"fixed",left:0,right:0,margin:"0 auto",bottom:kb>0?"calc("+kb+"px + 104px)":"calc(59px + env(safe-area-inset-bottom,16px) + 104px)",zIndex:590,width:40,height:40,borderRadius:"50%",background:"var(--card)",border:"1px solid var(--sep-strong)",boxShadow:"0 4px 16px rgba(0,0,0,0.18)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--t2)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg></button>)}
      <div style={{position:"fixed",bottom:kb>0?kb+"px":"calc(59px + env(safe-area-inset-bottom,16px))",left:0,right:0,background:"var(--card)",borderTop:"0.5px solid var(--sep)",zIndex:600,transition:"bottom 0.1s ease-out"}}>
        <div style={{textAlign:"center",fontSize:11.5,color:"var(--t2)",lineHeight:1.45,padding:"8px 24px 2px"}}>This assistant uses AI and isn't medical advice.</div>
        <div style={{padding:"6px 16px 10px",display:"flex",gap:8,alignItems:"flex-end"}}>

            <textarea ref={inputRef} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              onBlur={()=>setTimeout(()=>setKb(0),100)}
              placeholder="Ask a question…" rows={1}
              style={{flex:1,border:"none",outline:"none",background:"transparent",fontFamily:"inherit",fontSize:16,color:"var(--t1)",resize:"none",maxHeight:100,lineHeight:1.4,overflowY:"auto",minWidth:0}}
              onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,100)+"px";}}
            />
          </div>
          <button onClick={()=>send()} disabled={!input.trim()||loading}
            style={{width:42,height:42,borderRadius:"50%",background:"var(--acc)",border:"none",cursor:input.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:input.trim()&&!loading?1:0.4,transition:"opacity 0.15s"}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      </React.Fragment>, document.body)}
    </div>
  );
}

function HistoryView({view,setView,selectedDay,setSelectedDay,history,setHistory,pillList,archived,sessions,toggleHistoryTaken,storedEvents}){
  const [showingAll,setShowingAll]=useState(false);
  const [loadingMore,setLoadingMore]=useState(false);

  async function loadAll(){
    setLoadingMore(true);
    const rows=await sbGetAllDayKeys("pr:day:");
    const all=rows.map(r=>({date:r.key.replace("pr:day:",""),log:r.value})).filter(r=>r.log!==null).sort((a,b)=>b.date.localeCompare(a.date));
    setHistory(all);
    setShowingAll(true);
    setLoadingMore(false);
  }

  // Build event map: stored events first (newest first), then synthetic from archived
  // Stored events take priority — suppress synthetic if same pillId already covered
  const eventsByDate={};
  const coveredPillIds=new Set((storedEvents||[]).map(e=>e.pillId).filter(Boolean));
  // Stored events first (already newest-first from pr:events)
  for(const ev of(storedEvents||[])){
    if(!eventsByDate[ev.date])eventsByDate[ev.date]=[];
    eventsByDate[ev.date].push(ev);
  }
  // Synthetic from archived — only if not already covered by a stored event
  for(const session of["morning","lunch","evening"]){
    for(const pill of(archived[session]||[])){
      if(!pill.endDate)continue;
      if(coveredPillIds.has(pill.id))continue;
      const type=pill.eventType||(pill.durationDays!=null?"expired":"stopped");
      if(!eventsByDate[pill.endDate])eventsByDate[pill.endDate]=[];
      eventsByDate[pill.endDate].push({type,pill,session});
    }
  }
  const archiveByDate=eventsByDate;

  return(<div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:"calc(90px + env(safe-area-inset-bottom,0px))"}} className="fade-up scroll-view">
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"var(--card)",borderRadius:"0 0 24px 24px",boxShadow:"var(--shadow-md)",marginBottom:6,paddingTop:"calc(env(safe-area-inset-top,20px) + 20px)",paddingBottom:18,paddingLeft:20,paddingRight:20,backgroundImage:"radial-gradient(ellipse at 110% -10%, var(--acc-glow) 0%, transparent 60%)"}}>
        {selectedDay?(()=>{const{weekday,date}=formatDayHeader(selectedDay);return(<>
          <button onClick={()=>setSelectedDay(null)} style={{display:"flex",alignItems:"center",gap:6,padding:"0",marginBottom:14,background:"transparent",color:"var(--blue)",fontSize:16,fontWeight:500}}><IconBack/> History</button>
          <div style={{fontSize:13,color:"var(--t2)",fontWeight:500,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:4}}>{weekday}</div>
          <h1 className="serif" style={{fontSize:34,fontWeight:400,color:"var(--t1)",letterSpacing:"-0.01em",lineHeight:1.1}}>{date}</h1>
        </>);})():(<>
          <h1 className="serif" style={{fontSize:34,fontWeight:400,color:"var(--t1)",letterSpacing:"-0.01em",lineHeight:1.1}}>History</h1>
        </>)}
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {selectedDay?(()=>{
          const activePills=buildActivePillsForDate(selectedDay,pillList,archived);
          const dayLog=history.find(h=>h.date===selectedDay)?.log;
          const bySession={morning:[],lunch:[],evening:[]};
          for(const p of activePills)bySession[p.session].push(p);
          const asNeededLog=dayLog?.as_needed||{};
          const asNeededPillsForDay=(pillList.as_needed||[]).filter(p=>asNeededLog[p.id]?.length>0);
          return(<>
            {sessions.filter(({key})=>bySession[key].length>0).map(({key,label,accent})=>(
              <GroupCard key={key} label={label}>
                {bySession[key].map((pill,i)=>{const t=dayLog?.[key]?.[pill.id]??false;return(
                    <GroupRow key={pill.id} first={i===0} onClick={()=>toggleHistoryTaken(selectedDay,key,pill.id)}>
                      <div style={{display:"flex",alignItems:"center",gap:13,padding:"13px 16px"}}>
                        <button onClick={e=>{e.stopPropagation();toggleHistoryTaken(selectedDay,key,pill.id);}} style={{width:28,height:28,borderRadius:"50%",flexShrink:0,border:"2px solid "+(t?accent:"var(--sep)"),background:t?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",transition:"border-color 0.15s,background 0.15s"}}>{t&&<IconCheck/>}</button>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:500,color:"var(--t1)",opacity:t?0.4:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pill.name}</div>
                          <div style={{fontSize:14,color:"var(--t2)",marginTop:1}}>{pill.dose}</div>
                        </div>
                        <span style={{fontSize:13,fontWeight:600,color:t?"var(--green)":"var(--t3)"}}>{t?"Taken":"Missed"}</span>
                      </div>
                    </GroupRow>
                  );})}
              </GroupCard>
            ))}
            {asNeededPillsForDay.length>0&&(<GroupCard label="As needed">{asNeededPillsForDay.map((pill,i)=>{
              const entries=asNeededLog[pill.id]||[];
              const times=entries.map(e=>typeof e==="number"?fmtTime(e):(e?.time||"")).filter(Boolean);
              return(<GroupRow key={pill.id} first={i===0}><div style={{display:"flex",alignItems:"center",gap:13,padding:"13px 16px"}}><div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,background:"var(--acc-soft)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--acc)",fontSize:13,fontWeight:700}}>{entries.length}x</div><div style={{flex:1,minWidth:0}}><div style={{fontSize:16,fontWeight:500,color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pill.name}</div><div style={{fontSize:14,color:"var(--t2)",marginTop:1}}>{times.join(", ")}</div></div></div></GroupRow>);
            })}</GroupCard>)}
          </>);
        })():(
          <>
          <GroupCard label="Log">
            {history.length===0&&Object.keys(eventsByDate).length===0
              ?<div style={{padding:"20px 18px",color:"var(--t3)",fontSize:15,fontStyle:"italic",textAlign:"center"}}>No history yet</div>
              :(()=>{
                const allDates=[...new Set([...history.map(h=>h.date),...Object.keys(eventsByDate)])].sort((a,b)=>b.localeCompare(a));
                let rowIndex=0;
                return allDates.map(date=>{
                  const histEntry=history.find(h=>h.date===date);
                  const dayEvents=eventsByDate[date]||[];
                  const elements=[];
                  // Day row first
                  if(histEntry){
                    const{pct,taken:tk,total:tt}=dayScore(histEntry.log,pillList,archived,date);
                    const isToday=date===todayStr(),col=pct===100?"var(--green)":pct>=50?"var(--acc)":"var(--red)",C=2*Math.PI*13;
                    const isFirst=rowIndex===0;rowIndex++;
                    const activePillsForDots=buildActivePillsForDate(date,pillList,archived);
                    elements.push(<GroupRow key={date} first={isFirst} onClick={()=>setSelectedDay(date)}>
                      <div style={{display:"flex",alignItems:"center",gap:13,padding:"13px 16px"}}>
                        <div style={{position:"relative",width:32,height:32,flexShrink:0}}>
                          <svg width="32" height="32" style={{transform:"rotate(-90deg)"}}><circle cx="16" cy="16" r="13" fill="none" stroke="var(--sep)" strokeWidth="3.5"/><circle cx="16" cy="16" r="13" fill="none" stroke={col} strokeWidth="3.5" strokeDasharray={C} strokeDashoffset={C*(1-pct/100)} strokeLinecap="round"/></svg>
                          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:col}}>{pct}%</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:16,fontWeight:isToday?700:600,color:"var(--t1)"}}>
                            {isToday?<span>Today <span style={{fontSize:13,fontWeight:500,color:"var(--t2)"}}>· {formatShort(date)}</span></span>:(()=>{const[y,m,d]=date.split("-").map(Number);const dt=new Date(y,m-1,d);return<span>{dt.toLocaleDateString("en-US",{weekday:"short"})} <span style={{fontWeight:500,color:"var(--t2)"}}>· {dt.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></span>;})()}
                          </div>
                          <div style={{fontSize:13,color:"var(--t2)",marginTop:2}}>{tk} of {tt} medicines taken</div>
                        </div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,width:32,justifyContent:"flex-end",flexShrink:0}}>
                          {activePillsForDots.map(p=><div key={p.id} style={{width:7,height:7,borderRadius:"50%",background:histEntry.log?.[p.session]?.[p.id]?"var(--green)":"var(--sep)"}}/>)}
                        </div>
                        <div style={{color:"var(--t3)",marginLeft:2}}><IconChevron/></div>
                      </div>
                    </GroupRow>);
                  }
                  // Events after day row
                  dayEvents.forEach((ev,i)=>{
                    const key=ev.type+"-"+(ev.pillId||ev.pill?.id||i)+"-"+date;
                    const isFirst=rowIndex===0;rowIndex++;
                    const pillName=ev.pillName||ev.pill?.name||"";
                    const dose=ev.dose||ev.pill?.dose||"";
                    const sess=ev.session?ev.session.charAt(0).toUpperCase()+ev.session.slice(1):"";
                    let Icon,evText;
                    if(ev.type==="expired"){
                      Icon=IconArchive;
                      evText=<><span style={{fontStyle:"normal",fontWeight:500,color:"var(--t2)"}}>{pillName}</span>{" end of treatment"}</>;
                    } else if(ev.type==="stopped"){
                      Icon=IconEventStop;
                      evText=<><span style={{fontStyle:"normal",fontWeight:500,color:"var(--t2)"}}>{pillName}{dose?" "+dose:""}</span>{sess?" · "+sess:""}{" · stopped"}</>;
                    } else if(ev.type==="added"){
                      Icon=IconEventAdd;
                      evText=<><span style={{fontStyle:"normal",fontWeight:500,color:"var(--t2)"}}>{pillName}{dose?" "+dose:""}</span>{sess?" · "+sess:""}{" · added"}</>;
                    } else if(ev.type==="changed"){
                      Icon=IconEventChange;
                      evText=<><span style={{fontStyle:"normal",fontWeight:500,color:"var(--t2)"}}>{pillName}{" "}<span style={{textDecoration:"line-through"}}>{ev.oldDose}</span>{" → "}{ev.newDose}</span>{sess?" · "+sess:""}</>;
                    } else {
                      Icon=IconArchive;
                      evText=<><span style={{fontStyle:"normal",fontWeight:500,color:"var(--t2)"}}>{pillName}</span>{" "+ev.type}</>;
                    }
                    elements.push(<GroupRow key={key} first={isFirst}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px"}}>
                        <span style={{color:"var(--t3)",display:"flex",flexShrink:0}}><Icon/></span>
                        <span style={{fontSize:13,color:"var(--t3)",fontStyle:"italic"}}>{evText}</span>
                      </div>
                    </GroupRow>);
                  });
                  // Date-only event rows (no histEntry for that date)
                  if(!histEntry&&dayEvents.length>0){
                    // already rendered above, just ensure rowIndex is correct
                  }
                  return elements;
                });
              })()}
          </GroupCard>
          {!showingAll&&USER_TOKEN&&(
            <button onClick={loadAll} disabled={loadingMore} style={{width:"100%",padding:"13px",borderRadius:14,border:"none",background:"var(--card)",color:"var(--acc)",fontSize:15,fontWeight:600,boxShadow:"var(--shadow-sm)",marginTop:-16,marginBottom:24,cursor:"pointer",opacity:loadingMore?0.6:1}}>
              {loadingMore?"Loading…":"Show all history"}
            </button>
          )}
          </>
        )}
      </div>
    </div>
  </div>);
}

function SettingsView({profile,setProfile,pillList,archived,setPillList,setArchived,fileInputRef}){

              </div>

          </div>
        </div>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--t3)",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Data</div>
          <div style={{background:"var(--card)",borderRadius:16,overflow:"hidden",boxShadow:"var(--shadow-sm)"}}>

              const data={pillList,archived,logs,profile,exportedAt:new Date().toISOString()};

function NoTokenView(){
  const [val,setVal]=React.useState("");

    window.location.href=window.location.pathname+"?u="+encodeURIComponent(t);

      <div style={{width:56,height:56,borderRadius:16,background:"var(--acc-soft)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",color:"var(--acc)"}}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div style={{fontSize:20,fontWeight:700,color:"var(--t1)",marginBottom:8}}>Access required</div>
      <div style={{fontSize:14,color:"var(--t2)",lineHeight:1.6,marginBottom:20}}>Enter your access token to continue.</div>
      <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Your token" style={{width:"100%",boxSizing:"border-box",padding:"12px 14px",borderRadius:12,border:"1.5px solid var(--sep-strong)",background:"var(--bg)",color:"var(--t1)",fontSize:16,outline:"none",marginBottom:12,fontFamily:"inherit"}}/>
      <button onClick={go} style={{width:"100%",padding:"13px",borderRadius:12,background:"var(--acc)",color:"#fff",fontSize:16,fontWeight:600,border:"none",cursor:"pointer"}}>Continue</button>

}

function App(){
  const [view,setView]=useState("today");
  const [pillList,setPillList]=useState(DEFAULT_PILLS);
  const [archived,setArchived]=useState({morning:[],lunch:[],evening:[]});
  const [todayLog,setTodayLog]=useState({morning:{},lunch:{},evening:{}});
  const [asNeededTs,setAsNeededTs]=useState({});
  const [history,setHistory]=useState([]);
  const [flash,setFlash]=useState(null);
  const [aiTips,setAiTips]=useState(null);
  const [tipsLoading,setTipsLoading]=useState(false);
  const [hasNewTips,setHasNewTips]=useState(false);
  const [nurseMsgs,setNurseMsgs]=useState([]);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [newTipLabels,setNewTipLabels]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("pr:newTipLabels")||"[]"));}catch{return new Set();}});
  const tipCardRefs=React.useRef({});
  const tipsRef=React.useRef(null);
  async function forceRefreshTips(){
    setAiTips(null);
    setTipsLoading(true);
    const allPills=[...(pillList.morning||[]),...(pillList.lunch||[]),...(pillList.evening||[]),...(pillList.as_needed||[])];
    if(allPills.length===0){setTipsLoading(false);return;}
    const pillsDesc=allPills.map(p=>{const doseStr=p.dosageAmt&&p.dosageUnit?`${p.dosageAmt}${p.dosageUnit}`:p.dose||"";return`- ${p.name}${doseStr?` (${doseStr})`:""}`+(p.asNeeded?" [as needed]":"")+(p.maxDailyDose?` max ${p.maxDailyDose}x/day`:"");}).join("\n");
    const hashKey="pr:tips:"+btoa(unescape(encodeURIComponent(pillsDesc))).slice(0,40);
    try{
      const res=await fetch(`${SUPA_URL}/functions/v1/get-tips`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPA_KEY},body:JSON.stringify({pillsDesc})});
      const tips=await res.json();
      if(Array.isArray(tips)){setAiTips(tips);await sbSet(hashKey,tips);const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=tips.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}}
    }catch(e){console.error(e);}
    setTipsLoading(false);
  }
  React.useEffect(()=>{
    if(newTipLabels.size===0)return;
    const observers=[];
    function markSeen(label){
      setNewTipLabels(prev=>{
        const next=new Set(prev);
        next.delete(label);
        const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");
        if(!seenRaw.includes(label))seenRaw.push(label);
        localStorage.setItem("pr:seenTipLabels",JSON.stringify(seenRaw));
        if(next.size===0)setHasNewTips(false);
        return next;
      });
    }
    function markAllSeen(){
      const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");
      for(const label of newTipLabels){if(!seenRaw.includes(label))seenRaw.push(label);}
      localStorage.setItem("pr:seenTipLabels",JSON.stringify(seenRaw));
      setNewTipLabels(new Set());
      setHasNewTips(false);
    }
    for(const label of newTipLabels){
      const el=tipCardRefs.current[label];
      if(!el)continue;
      const obs=new IntersectionObserver(([e])=>{
        if(e.isIntersecting){obs.disconnect();markSeen(label);}
      },{threshold:0.5});
      obs.observe(el);
      observers.push(obs);
    }
    function onScroll(){
      const nearBottom=window.scrollY+window.innerHeight>=document.documentElement.scrollHeight-60;
      if(nearBottom)markAllSeen();
    }
    window.addEventListener("scroll",onScroll,{passive:true});
    return()=>{observers.forEach(o=>o.disconnect());window.removeEventListener("scroll",onScroll);};
  },[newTipLabels]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(false);
  const [selectedDay,setSelectedDay]=useState(null);
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installed,setInstalled]=useState(false);
  const [detailSheet,setDetailSheet]=useState(null);
  const [pendingVersionEdit,setPendingVersionEdit]=useState(null);
  const [versionInventory,setVersionInventory]=useState("");
  const [storedEvents,setStoredEvents]=useState([]);
  const [missedDtStr,setMissedDtStr]=useState(null);
  const [addSheet,setAddSheet]=useState(null);
  const [profile,setProfile]=useState({name:"",age:"",weight:"",height:""});
  const [now,setNow]=useState(Date.now());
  const fileInputRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),30000);return()=>clearInterval(t);},[]);
  useEffect(()=>{window.scrollTo(0,0);},[view]);
  useEffect(()=>{const h=e=>{e.preventDefault();setInstallPrompt(e);};window.addEventListener("beforeinstallprompt",h);window.addEventListener("appinstalled",()=>{setInstalled(true);setInstallPrompt(null);});return()=>window.removeEventListener("beforeinstallprompt",h);},[]);

  const loadData=useCallback(async()=>{
    setLoadError(false);setLoading(true);
    try{
      let list=await sbGet(PILL_LIST_KEY)||DEFAULT_PILLS;
      if(list.night&&!list.evening){list={...list,evening:list.night,lunch:list.lunch||[]};delete list.night;}
      if(!list.lunch)list={...list,lunch:[]};
      if(!list.as_needed)list={...list,as_needed:[]};
      const archResult=await archiveExpired(list);list=archResult.list;
      for(const sess of["morning","lunch","evening"]){list[sess]=(list[sess]||[]).map(p=>{if(p.schedules)return p;const sessions=p.sessions||(p.session&&p.session!=="as_needed"?[p.session]:[sess]);const timings=p.timings||(p.timing?[p.timing]:[]);return{...p,schedules:sessions.map((s,i)=>({session:s,timing:timings[i]||""})),sessions};});}
      setPillList(list);
      if(archResult.changed){setAiTips(null);}
      generateTips(list);
      const arch=await sbGet(ARCHIVED_KEY)||{morning:[],lunch:[],evening:[]};
      if(arch.night&&!arch.evening){arch.evening=arch.night;delete arch.night;}if(!arch.lunch)arch.lunch=[];
      setArchived(arch);
      try{const evts=await sbGet(EVENTS_KEY)||[];setStoredEvents(Array.isArray(evts)?evts:[]);}catch(e){console.warn("events load failed",e);setStoredEvents([]);}
      const prof=await sbGet(PROFILE_KEY)||{name:"",age:"",weight:"",height:""};setProfile(prof);
      const today=todayStr();let log=await sbGet(dayKey(today));
      if(!log){log=buildEmptyLog(list);await sbSet(dayKey(today),log);}
      setTodayLog(log);
      const tsToday=await sbGet(asNeededDayKey(today))||{};
      const yesterday=addDays(today,-1);
      const tsYesterday=await sbGet(asNeededDayKey(yesterday))||{};
      const cutoff=Date.now()-24*3600000;
      const tsMerged={...tsToday};
      for(const[id,arr] of Object.entries(tsYesterday)){
        const recent=(arr||[]).filter(t=>t>cutoff);
        if(recent.length>0)tsMerged[id]=[...recent,...(tsMerged[id]||[])].sort((a,b)=>a-b);
      }
      const tsClean={};for(const[id,arr] of Object.entries(tsMerged)){tsClean[id]=[...new Set(arr||[])].sort((a,b)=>a-b);}
      setAsNeededTs(tsClean);
    }catch(e){
      console.warn("load failed",e);
      setLoadError(true);
    }finally{
      setLoading(false);if(window.hideSplash)window.hideSplash();
    }
  },[]);

  useEffect(()=>{
    if(!USER_TOKEN){if(window.hideSplash)window.hideSplash();setLoading(false);return;}
    loadData();
    const goOnline=()=>{setIsOnline(true);flushSyncQueue();};
    const goOffline=()=>setIsOnline(false);
    window.addEventListener('online',goOnline);
    window.addEventListener('offline',goOffline);
    return()=>{window.removeEventListener('online',goOnline);window.removeEventListener('offline',goOffline);};
  },[]);

  function buildEmptyLog(list){
    const m={},l={},e={};
    const allPills=[...(list.morning||[]),...(list.lunch||[]),...(list.evening||[])];
    for(const pill of allPills){
      const sessions=pill.schedules?pill.schedules.map(s=>s.session):pill.sessions||[pill.session||"morning"];
      for(const s of sessions){if(s==="morning")m[pill.id]=false;else if(s==="lunch")l[pill.id]=false;else if(s==="evening")e[pill.id]=false;}
    }
    return{morning:m,lunch:l,evening:e,as_needed:{}};
  }

  const loadHistory=useCallback(async()=>{
    const days=getLast30Days();
    const results=await Promise.all(days.map(async d=>({date:d,log:await sbGet(dayKey(d))})));
    setHistory(results.filter(r=>r.log!==null));
  },[]);
  useEffect(()=>{if(view==="history")loadHistory();},[view,loadHistory]);
  const VIEWS=["today","history","nurse","settings"];
  useEffect(()=>{
    let startX=0,startY=0,locked=null;
    function onStart(e){
      if(e.touches[0].clientX<30)return;
      startX=e.touches[0].clientX;
      startY=e.touches[0].clientY;
      locked=null;
    }
    function onMove(e){
      if(!startX)return;
      const dx=e.touches[0].clientX-startX;
      const dy=e.touches[0].clientY-startY;
      if(!locked){
        if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>8)locked="x";
        else if(Math.abs(dy)>8){locked="v";startX=0;return;}
        else return;
      }
      if(locked==="x")e.preventDefault();
    }
    function onEnd(e){
      if(!startX||locked!=="x")return;
      const dx=e.changedTouches[0].clientX-startX;
      startX=0;locked=null;
      if(Math.abs(dx)<60)return;
      document.querySelectorAll(".scroll-view").forEach(el=>{el.scrollTop=0;});
      setView(cur=>{
        const idx=VIEWS.indexOf(cur);
        if(dx<0&&idx<VIEWS.length-1){
          const next=VIEWS[idx+1];
          if(next==="history")setSelectedDay(null);
          return next;
        }
        if(dx>0&&idx>0)return VIEWS[idx-1];
        return cur;
      });
    }
    document.addEventListener("touchstart",onStart,{passive:true});
    document.addEventListener("touchmove",onMove,{passive:false});
    document.addEventListener("touchend",onEnd,{passive:true});
    return()=>{
      document.removeEventListener("touchstart",onStart);
      document.removeEventListener("touchmove",onMove);
      document.removeEventListener("touchend",onEnd);
    };
  },[]);

  async function toggleTaken(session,id){const newLog={...todayLog,[session]:{...todayLog[session],[id]:!todayLog[session][id]}};setTodayLog(newLog);await sbSet(dayKey(todayStr()),newLog);if(newLog[session][id]){setFlash(id);setTimeout(()=>setFlash(null),400);}}
  async function toggleHistoryTaken(date,session,id){const existing=await sbGet(dayKey(date))||{morning:{},lunch:{},evening:{}};const newLog={...existing,[session]:{...existing[session],[id]:!existing[session]?.[id]}};await sbSet(dayKey(date),newLog);setHistory(prev=>prev.map(h=>h.date===date?{...h,log:newLog}:h));}


  async function generateTips(list){
    const allPills=[...(list.morning||[]),...(list.lunch||[]),...(list.evening||[]),...(list.as_needed||[])];
    if(allPills.length===0){setAiTips([]);return;}
    const pillsDesc=allPills.map(p=>{
      const doseStr=p.dosageAmt&&p.dosageUnit?`${p.dosageAmt}${p.dosageUnit}`:p.dose||"";
      return `- ${p.name}${doseStr?` (${doseStr})`:""}`+
        (p.asNeeded?" [as needed]":"")+
        (p.maxDailyDose?` max ${p.maxDailyDose}x/day`:"");
    }).join("\n");
    const hashKey="pr:tips:"+btoa(unescape(encodeURIComponent(pillsDesc))).slice(0,40);
    try{
      const cached=await sbGet(hashKey);
      if(cached&&Array.isArray(cached)){const activeNames=allPills.map(p=>p.name.toLowerCase());const filtered=cached.filter(t=>t.label.toLowerCase()==="interactions"||activeNames.some(n=>t.label.toLowerCase().includes(n)||n.includes(t.label.toLowerCase())));if(filtered.length!==cached.length){await sbSet(hashKey,filtered);}setAiTips(filtered);const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=filtered.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}else{setHasNewTips(false);}setTipsLoading(false);return;}
    }catch{}
    setTipsLoading(true);
    try{
      const res=await fetch(`${SUPA_URL}/functions/v1/get-tips`,{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPA_KEY},
        body:JSON.stringify({pillsDesc})
      });
      const tips=await res.json();
      if(Array.isArray(tips)){
        setAiTips(tips);
        const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=tips.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}else{setHasNewTips(false);}
        await sbSet(hashKey,tips);
      }
    }catch(e){console.error("Tips error",e);setAiTips([]);}
    setTipsLoading(false);
  }

  async function addPill(defaultSession,pillData){
    // Handle multi-entry scan result
    if(pillData._multiEntry&&pillData.entries){
      let newList={...pillList};
      let newLog={...todayLog};
      let newEvts=[...storedEvents];
      const today=todayStr();
      for(const entry of pillData.entries){
        const sess=entry.sessions?.[0]||"morning";
        const id=sess[0]+Date.now()+Math.random().toString(36).slice(2,5);
        const pill={id,...entry,schedules:entry.schedules||[{session:sess,timing:""}],sessions:[sess]};
        newList={...newList,[sess]:[...(newList[sess]||[]),pill]};
        newLog={...newLog,[sess]:{...newLog[sess],[id]:false}};
        newEvts=[{type:"added",date:today,pillName:pill.name,dose:pill.dose||"",session:sess,pillId:id},...newEvts];
      }
      setPillList(newList);setTodayLog(newLog);
      await sbSet(PILL_LIST_KEY,newList);await sbSet(dayKey(today),newLog);
      setStoredEvents(newEvts);await sbSet(EVENTS_KEY,newEvts);
      setTipsLoading(true);setAddSheet(null);generateTips(newList);
      return;
    }
    const{sessions:pillSessions=null,schedules:pillSchedules=null,session:legacySess,...rest}=pillData;
    const sessList=pillSessions||(legacySess&&legacySess!=="as_needed"?[legacySess]:[defaultSession]);
    const primarySess=sessList[0]||defaultSession;
    const id=primarySess[0]+Date.now();
    const pill={id,...rest,schedules:pillSchedules||sessList.map(s=>({session:s,timing:""})),sessions:sessList};
    const newList={...pillList,[primarySess]:[...(pillList[primarySess]||[]),pill]};
    let newLog={...todayLog};
    for(const s of sessList){if(s!=="as_needed")newLog={...newLog,[s]:{...newLog[s],[id]:false}};}
    setPillList(newList);setTodayLog(newLog);
    await sbSet(PILL_LIST_KEY,newList);await sbSet(dayKey(todayStr()),newLog);
    const evtsAfterAdd=[{type:"added",date:todayStr(),pillName:pill.name,dose:pill.dose||"",session:primarySess,pillId:id},...storedEvents];setStoredEvents(evtsAfterAdd);await sbSet(EVENTS_KEY,evtsAfterAdd);
    setTipsLoading(true);
    setAddSheet(null);
    generateTips(newList);
  }

  async function takeAsNeeded(id){
    const ts=Date.now();const today=todayStr();
    const existing=asNeededTs[id]||[];
    const newTs={...asNeededTs,[id]:[...new Set([...existing,ts])].sort((a,b)=>a-b)};
    setAsNeededTs(newTs);
    await sbSet(asNeededDayKey(today),cleanMapToday(newTs));
    const logExisting=todayLog.as_needed?.[id]||[];
    const newLog={...todayLog,as_needed:cleanMapToday({...todayLog.as_needed,[id]:[...new Set([...logExisting,ts])]})};
    setTodayLog(newLog);await sbSet(dayKey(today),newLog);
    setFlash(id);setTimeout(()=>setFlash(null),400);
  }

  async function deleteAsNeededPill(id){
    const newList={...pillList,as_needed:(pillList.as_needed||[]).filter(p=>p.id!==id)};
    const newLog={...todayLog,as_needed:{...todayLog.as_needed}};delete newLog.as_needed[id];
    const newTs={...asNeededTs};delete newTs[id];
    setPillList(newList);setTodayLog(newLog);setAsNeededTs(newTs);
    await sbSet(PILL_LIST_KEY,newList);await sbSet(dayKey(todayStr()),newLog);await sbSet(asNeededDayKey(todayStr()),newTs);
    generateTips(newList);
  }

  async function deletePill(session,id){
    if(session==="as_needed")return deleteAsNeededPill(id);
    let foundSess=session,pill=null;
    for(const s of["morning","lunch","evening"]){pill=(pillList[s]||[]).find(p=>p.id===id);if(pill){foundSess=s;break;}}
    const newList={...pillList,[foundSess]:(pillList[foundSess]||[]).filter(p=>p.id!==id)};
    let newLog={...todayLog};
    const sessionsToClean=pill?.schedules?pill.schedules.map(s=>s.session):pill?.sessions||[foundSess];
    for(const s of sessionsToClean){if(newLog[s]){newLog={...newLog,[s]:{...newLog[s]}};delete newLog[s][id];}}
    if(pill){const evtsAfterDel=[{type:"stopped",date:todayStr(),pillName:pill.name,dose:pill.dose||"",session:foundSess,pillId:id},...storedEvents];setStoredEvents(evtsAfterDel);await sbSet(EVENTS_KEY,evtsAfterDel);}
    setPillList(newList);setTodayLog(newLog);await sbSet(PILL_LIST_KEY,newList);await sbSet(dayKey(todayStr()),newLog);
    generateTips(newList);
  }

  const sessions=pillList?[{key:"morning",label:"Morning",Icon:IconSunrise,accent:"var(--acc)"},{key:"lunch",label:"Lunch",Icon:IconSun,accent:"var(--acc)"},{key:"evening",label:"Evening",Icon:IconMoon,accent:"var(--acc)"}]:[];

  if(loadError)return(<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}>
    <div style={{fontSize:17,fontWeight:600,color:"var(--t1)",marginBottom:8}}>Connection problem</div>
    <div style={{fontSize:14,color:"var(--t2)",marginBottom:24,maxWidth:280,lineHeight:1.5}}>Couldn't load your data. Check your connection and try again.</div>
    <button onClick={()=>loadData()} style={{background:"var(--acc)",color:"#fff",border:"none",borderRadius:12,padding:"12px 28px",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Retry</button>
  </div>);
  if(!USER_TOKEN)return <NoTokenView/>;

        }
        function tsToTimeInput(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
        function timeInputToTs(val,refTs){const[h,m]=val.split(":").map(Number);const d=new Date(refTs||Date.now());d.setHours(h,m,0,0);return d.getTime();}
        function nowDtl(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
        function minDtl(){const d=new Date(startOfTodayTs()-1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T00:00";}
        return(<div style={{borderTop:"0.5px solid var(--sep)",padding:"16px 20px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--t2)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Today's doses</div>
          <div style={{background:"var(--card)",borderRadius:12,overflow:"hidden",boxShadow:"var(--shadow-sm)"}}>
            {displayTs.length===0&&(
              <div style={{padding:"13px 16px",color:"var(--t3)",fontSize:14,fontStyle:"italic"}}>No doses logged today</div>
            )}
            {displayTs.map((ts,i)=>{const ordinals=["1st","2nd","3rd","4th","5th","6th","7th","8th"];const ord=ordinals[i]||(i+1)+"th";return(
              <div key={ts+"-"+i} style={{position:"relative"}}>
                {i>0&&<div style={{position:"absolute",top:0,left:16,right:0,height:"0.5px",background:"var(--sep)"}}/>}
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px"}}>
                  <span style={{fontSize:13,fontWeight:500,color:"var(--t2)",minWidth:52}}>{ord} dose</span>
                  <input type="time" defaultValue={tsToTimeInput(ts)}
                    onBlur={e=>{const newVal=e.target.value;if(!newVal)return;const idx=timestamps.indexOf(ts);const newTs=[...timestamps];newTs[idx]=timeInputToTs(newVal,ts);updateTimestamps(newTs);}}
                    style={{flex:1,border:"none",background:"transparent",color:"var(--blue)",fontSize:15,fontWeight:500,cursor:"pointer",padding:0}}/>
                  <button onClick={()=>{const idx=timestamps.indexOf(ts);updateTimestamps([...timestamps.slice(0,idx),...timestamps.slice(idx+1)]);}}
                    style={{width:28,height:28,borderRadius:8,background:"rgba(229,52,44,0.10)",border:"none",color:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
                  </button>
                </div>
              </div>
            );})}
            <div style={{position:"relative"}}>
              {displayTs.length>0&&<div style={{position:"absolute",top:0,left:16,right:0,height:"0.5px",background:"var(--sep)"}}/>}
              {missedDtStr!==null
                ?(<div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
                    <input type="datetime-local" value={missedDtStr} min={minDtl()} max={nowDtl()}
                      onChange={e=>setMissedDtStr(e.target.value)}
                      style={{fontSize:15,color:"var(--t1)",background:"var(--bg2)",border:"0.5px solid var(--sep)",borderRadius:10,padding:"10px 12px",width:"100%",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setMissedDtStr(null)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--sep)",color:"var(--t2)",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                      <button onClick={()=>addMissedDose(missedDtStr)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--acc)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Add dose</button>
                    </div>
                  </div>)
                :(<button onClick={()=>setMissedDtStr(nowDtl())} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:"transparent",border:"none",color:"var(--acc)",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left"}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
                    Add missed dose
                  </button>)
              }
            </div>
          </div>
        </div>);
      })()}
      <div style={{borderTop:"0.5px solid var(--sep)"}}>
        <PillForm initial={detailSheet.pill} accent={detailSheet.accent} submitLabel="Save" noAutoFocus={true}
          onSave={async(data)=>{
            const id=detailSheet.pill.id;
            const{schedules:newSchedules=[],sessions:newSessions,...rest}=data;
            // as_needed: no versioning, just overwrite
            if(detailSheet.session==="as_needed"){
              const updatedPill={...detailSheet.pill,...rest,schedules:[],sessions:["as_needed"]};
              const newList={...pillList,as_needed:(pillList.as_needed||[]).map(p=>p.id===id?updatedPill:p)};
              setPillList(newList);await sbSet(PILL_LIST_KEY,newList);setDetailSheet(null);return;
            }
            // detect clinical change: dose, schedules, startDate, durationDays
            const old=detailSheet.pill;
            const oldSchedStr=JSON.stringify((old.schedules||[{session:detailSheet.session,timing:""}]).map(s=>({session:s.session,timing:s.timing||""})));
            const newSchedStr=JSON.stringify((newSchedules||[]).map(s=>({session:s.session,timing:s.timing||""})));
            const clinicalChanged=(rest.dosageAmt!==old.dosageAmt||rest.dosageUnit!==old.dosageUnit||rest.dose!==old.dose||rest.startDate!==old.startDate||rest.durationDays!==old.durationDays||oldSchedStr!==newSchedStr);
            if(clinicalChanged){setPendingVersionEdit({id,data,newSchedules,newSessions,rest});return;}
            // cosmetic change only: overwrite in place
            const oldSchedules=old.schedules||[{session:detailSheet.session,timing:""}];
            const oldSessions=oldSchedules.map(s=>s.session);
            const newSessList=newSchedules.map(s=>s.session);
            let primarySess=oldSessions[0];
            for(const s of["morning","lunch","evening"]){if((pillList[s]||[]).find(p=>p.id===id)){primarySess=s;break;}}
            const newPrimarySess=newSessList[0]||primarySess;
            const updatedPill={...old,...rest,schedules:newSchedules,sessions:newSessList};
            let newList={...pillList};
            if(newPrimarySess!==primarySess){newList[primarySess]=(newList[primarySess]||[]).filter(p=>p.id!==id);newList[newPrimarySess]=[...(newList[newPrimarySess]||[]),updatedPill];}
            else{newList[primarySess]=(newList[primarySess]||[]).map(p=>p.id===id?updatedPill:p);}
            let newLog={...todayLog};
            for(const s of oldSessions){if(!newSessList.includes(s)&&newLog[s]){newLog={...newLog,[s]:{...newLog[s]}};delete newLog[s][id];}}
            for(const s of newSessList){if(!oldSessions.includes(s)&&s!=="as_needed"){newLog={...newLog,[s]:{...newLog[s],[id]:false}};}}
            setTodayLog(newLog);await sbSet(dayKey(todayStr()),newLog);
            setPillList(newList);await sbSet(PILL_LIST_KEY,newList);setDetailSheet(null);
          }}
          onCancel={()=>setDetailSheet(null)}
        />
      </div>
    </BottomSheet>)}
    {pendingVersionEdit&&(<div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center",background:"rgba(0,0,0,0.4)"}} onClick={()=>setPendingVersionEdit(null)}>
      <div style={{width:"100%",maxWidth:480,background:"var(--card)",borderRadius:"20px 20px 0 0",padding:"28px 20px calc(28px + env(safe-area-inset-bottom))",boxShadow:"0 -4px 24px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,fontWeight:700,color:"var(--t1)",marginBottom:8}}>Changement de dose</div>
        <div style={{fontSize:15,color:"var(--t2)",lineHeight:1.5,marginBottom:20}}>Ce changement s'appliquera à partir d'aujourd'hui. L'historique passé sera conservé tel quel avec l'ancienne dose.</div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:600,color:"var(--t2)",marginBottom:6}}>Comprimés reçus du pharmacien <span style={{fontWeight:400,color:"var(--t3)"}}>(optionnel)</span></div>
          <input
            type="text" inputMode="decimal"
            placeholder="ex: 60"
            value={versionInventory}
            onChange={e=>setVersionInventory(e.target.value.replace(/[^0-9]/g,""))}
            style={{width:"100%",padding:"13px 14px",borderRadius:12,border:"1.5px solid var(--sep)",background:"var(--bg)",color:"var(--t1)",fontSize:16,outline:"none"}}
          />
          {versionInventory&&parseInt(versionInventory)>0&&pendingVersionEdit&&(()=>{
            const dosesPerDay=(pendingVersionEdit.newSchedules||[{session:"morning"}]).filter(s=>s.session!=="as_needed").length||1;
            const days=Math.floor(parseInt(versionInventory)/dosesPerDay);
            return <div style={{fontSize:13,color:"var(--t2)",marginTop:6}}>Fin estimée : {(()=>{const d=new Date();d.setDate(d.getDate()+days);return d.toLocaleDateString("fr-CA");})()}</div>;
          })()}
        </div>
        <button onClick={async()=>{
          const{id,data,newSchedules,newSessions,rest}=pendingVersionEdit;
          const old=detailSheet.pill;
          const today=todayStr();
          // 1. archive the old pill version with endDate=today
          const existingArchived=await sbGet(ARCHIVED_KEY)||{morning:[],lunch:[],evening:[]};
          let foundSessForArchive="morning";
          for(const s of["morning","lunch","evening"]){if((pillList[s]||[]).find(p=>p.id===id)){foundSessForArchive=s;break;}}
          const archivedPill={...old,endDate:today,archivedOn:today};
          const newArchived={...existingArchived,[foundSessForArchive]:[...(existingArchived[foundSessForArchive]||[]),archivedPill]};
          await sbSet(ARCHIVED_KEY,newArchived);setArchived(newArchived);
          // 2. create new pill with new ID, startDate=today, optional inventory
          const newSessList=(newSchedules||[]).map(s=>s.session);
          const primarySess=newSessList[0]||foundSessForArchive;
          const newId=primarySess[0]+Date.now();
          const invCount=versionInventory?parseInt(versionInventory):null;
          const dosesPerDay=newSessList.filter(s=>s!=="as_needed").length||1;
          const newDurationDays=invCount&&invCount>0?Math.floor(invCount/dosesPerDay):rest.durationDays;
          const newPill={...old,...rest,id:newId,schedules:newSchedules||[],sessions:newSessList,startDate:today,
            ...(invCount&&invCount>0?{hasInventory:true,inventoryCount:invCount,inventoryStartDate:today,durationDays:newDurationDays}:{})
          };
          // 3. remove old pill from pillList, add new one
          let newList={...pillList};
          newList[foundSessForArchive]=(newList[foundSessForArchive]||[]).filter(p=>p.id!==id);
          if(primarySess!==foundSessForArchive){newList[primarySess]=[...(newList[primarySess]||[]),newPill];}
          else{newList[foundSessForArchive]=[...newList[foundSessForArchive],newPill];}
          // 4. update today's log: remove old id, add new id as false
          let newLog={...todayLog};
          for(const s of["morning","lunch","evening"]){if(newLog[s]&&newLog[s][id]!==undefined){newLog={...newLog,[s]:{...newLog[s]}};delete newLog[s][id];}}
          for(const s of newSessList){if(s!=="as_needed"){newLog={...newLog,[s]:{...newLog[s],[newId]:false}};}}
          setTodayLog(newLog);await sbSet(dayKey(today),newLog);
          setPillList(newList);await sbSet(PILL_LIST_KEY,newList);
          const evtsAfterChange=[{type:"changed",date:today,pillName:old.name,oldDose:old.dose||"",newDose:rest.dose||"",session:foundSessForArchive,pillId:newId},...storedEvents];setStoredEvents(evtsAfterChange);await sbSet(EVENTS_KEY,evtsAfterChange);
          setVersionInventory("");setPendingVersionEdit(null);setDetailSheet(null);
        }} style={{width:"100%",padding:"14px",borderRadius:14,background:"var(--acc)",color:"#fff",fontSize:16,fontWeight:600,border:"none",cursor:"pointer",marginBottom:12}}>Confirmer le changement</button>
        <button onClick={()=>{setVersionInventory("");setPendingVersionEdit(null);}} style={{width:"100%",padding:"12px",borderRadius:14,background:"transparent",color:"var(--t2)",fontSize:15,fontWeight:500,border:"none",cursor:"pointer"}}>Annuler</button>
      </div>
    </div>)}
    <TabBar view={view} setView={setView} setSelectedDay={setSelectedDay} hasNewTips={hasNewTips}/>

  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker"in navigator){
  const sw='const C="pr-v165",A=[self.location.pathname];self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{if(e.request.url.includes("supabase.co")){e.respondWith(fetch(e.request));return;}if(e.request.mode==="navigate"){e.respondWith(fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match(e.request).then(r=>r||caches.match(self.location.pathname))));return;}e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;})));});';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"})),{scope:"./"}).catch(e=>console.warn(e));
}
</script>
</body>
</html>
