function resolveToken(){
  const params=new URLSearchParams(window.location.search);
  const urlToken=params.get("u");
  if(urlToken){localStorage.setItem("pr:token",urlToken);return urlToken;}
  return localStorage.getItem("pr:token")||null;
}

async function sbGet(key){
  if(!USER_TOKEN)return null;
  const res=await fetch(`${SUPA_URL}/rest/v1/data?user_token=eq.${encodeURIComponent(USER_TOKEN)}&key=eq.${encodeURIComponent(key)}&select=value`,{headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}});

}

async function searchDrugs(query){
  if(!query||query.length<2)return[];
  try{
    const q=encodeURIComponent(query);
    const res=await fetch("https://api.fda.gov/drug/label.json?search=openfda.brand_name:"+q+"*+OR+openfda.generic_name:"+q+"*&limit=10");
    if(!res.ok)return[];
    const data=await res.json();
    const results=[],seen=new Set();
    function toTitle(s){return s?s.charAt(0).toUpperCase()+s.slice(1).toLowerCase():"";}
    for(const r of (data.results||[])){
      const brands=r.openfda?.brand_name||[],generics=r.openfda?.generic_name||[];
      for(const name of brands){const k=name.toLowerCase();if(!seen.has(k)){seen.add(k);results.push({name:toTitle(name),sub:generics[0]?toTitle(generics[0]):""});}}
      for(const name of generics){const k=name.toLowerCase();if(!seen.has(k)){seen.add(k);results.push({name:toTitle(name),sub:brands[0]?"Brand: "+toTitle(brands[0]):"Generic"});}}
      if(results.length>=8)break;
    }
    return results.slice(0,8);
  }catch{return[];}
}

function BottomSheet({onClose,children}){
  const sheetRef=useRef(null);
  const dragY=useRef(0),startY=useRef(0),isDragging=useRef(false);
  function onTouchStart(e){const el=sheetRef.current;if(!el||el.scrollTop>0)return;startY.current=e.touches[0].clientY;dragY.current=0;isDragging.current=true;}
  function onTouchMove(e){if(!isDragging.current)return;const el=sheetRef.current;if(!el||el.scrollTop>0){isDragging.current=false;return;}const dy=e.touches[0].clientY-startY.current;if(dy<0){isDragging.current=false;return;}dragY.current=dy;el.style.transform="translateY("+dy+"px)";el.style.transition="none";}
  function onTouchEnd(){if(!isDragging.current)return;isDragging.current=false;const el=sheetRef.current;if(!el)return;if(dragY.current>80){el.style.transition="transform 0.28s cubic-bezier(0.32,0.72,0,1)";el.style.transform="translateY(100%)";setTimeout(onClose,280);}else{el.style.transition="transform 0.22s cubic-bezier(0.22,1,0.36,1)";el.style.transform="translateY(0)";}}
  return ReactDOM.createPortal(<>
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:1100,background:"rgba(0,0,0,0.4)",backdropFilter:"blur(2px)",WebkitBackdropFilter:"blur(2px)"}}/>
    <div ref={el=>{sheetRef.current=el;if(el){el.scrollTop=0;requestAnimationFrame(()=>{el.scrollTop=0;});}}}
      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
      style={{position:"fixed",bottom:0,left:0,right:0,zIndex:1101,background:"var(--card)",borderRadius:"20px 20px 0 0",boxShadow:"0 -4px 32px rgba(0,0,0,0.18)",paddingBottom:"env(safe-area-inset-bottom,24px)",maxHeight:"82vh",overflowY:"auto",animation:"sheetUp 0.28s cubic-bezier(0.32,0.72,0,1)",willChange:"transform"}}>
      <div style={{display:"flex",justifyContent:"center",paddingTop:12,paddingBottom:8,cursor:"grab"}}>
        <div style={{width:36,height:4,borderRadius:2,background:"var(--sep)"}}/>
      </div>
      {children}
    </div>
  </>,document.body);
}

function PillForm({initial,accent,onSave,onCancel,submitLabel="Add",defaultSession="morning",noAutoFocus=false}){
  const [name,setName]=useState(initial?.name||"");
  const [shape,setShape]=useState(initial?.shape||"capsule");
  const [ongoing,setOngoing]=useState(initial?.durationDays==null);
  const [durationDays,setDurationDays]=useState(initial?.durationDays||7);
  const [startDate,setStartDate]=useState(initial?.startDate||todayStr());
  const [asNeeded,setAsNeeded]=useState(initial?.asNeeded!=null?initial.asNeeded:false);
  const [maxDailyDose,setMaxDailyDose]=useState(initial?.maxDailyDose||3);
  const [minIntervalHours,setMinIntervalHours]=useState(initial?.minIntervalHours||4);
  const [schedules,setSchedules]=useState(()=>{
    if(initial?.schedules)return initial.schedules;
    const sess=initial?.sessions||(initial?.session&&initial.session!=="as_needed"?[initial.session]:[defaultSession||"morning"]);
    const timings=initial?.timings||(initial?.timing?[initial.timing]:[]);
    return sess.map((s,i)=>({session:s,timing:timings[i]||""}));
  });
  function parseDose(d){const m=(d||"").match(/^(\d+(?:\.\d+)?)\s*(.*)$/);if(m)return{amt:Number(m[1])||10,unit:m[2].trim()||"mg",qty:1};return{amt:10,unit:"mg",qty:1};}
  const parsed=parseDose(initial?.dose);
  const [dosageAmt,setDosageAmt]=useState(initial?.dosageAmt||parsed.amt);
  const [dosageUnit,setDosageUnit]=useState(initial?.dosageUnit||parsed.unit||"mg");
  const [quantity,setQuantity]=useState(initial?.quantity||parsed.qty||1);
  const [suggestions,setSuggestions]=useState([]);
  const [showSuggestions,setShowSuggestions]=useState(false);
  const searchTimer=useRef(null);
  function handleNameChange(val){setName(val);setShowSuggestions(true);clearTimeout(searchTimer.current);if(val.length<2){setSuggestions([]);return;}searchTimer.current=setTimeout(async()=>{const res=await searchDrugs(val);setSuggestions(res);},300);}
  function pickSuggestion(s){setName(s.name);setSuggestions([]);setShowSuggestions(false);}
  function handleSave(){
    if(!name.trim())return;
    const dose=quantity+" x "+dosageAmt+dosageUnit;
    const sessions=asNeeded?["as_needed"]:schedules.map(s=>s.session);
    onSave({name:name.trim(),dose,dosageAmt,dosageUnit,quantity,shape,schedules:asNeeded?[]:schedules,sessions,startDate,durationDays:ongoing?null:Number(durationDays),asNeeded,maxDailyDose:asNeeded?Number(maxDailyDose):null,minIntervalHours:asNeeded?Number(minIntervalHours):null});
  }
  const stepBtn=(onClick,label)=>(<button onClick={onClick} style={{width:28,height:28,borderRadius:8,background:"var(--acc-soft)",border:"none",color:"var(--acc)",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{label}</button>);
  return(
    <div style={{padding:"16px 16px 8px",background:"var(--card2)"}}>
      <div style={{position:"relative",marginBottom:16}}>
        <input autoFocus={!noAutoFocus} placeholder="Medicine name" value={name}
          onChange={e=>handleNameChange(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()}
          onFocus={()=>suggestions.length>0&&setShowSuggestions(true)}
          style={{width:"100%",padding:"11px 14px",borderRadius:12,border:"none",background:"var(--card)",color:"var(--t1)",fontSize:16,display:"block",boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}/>
        {showSuggestions&&suggestions.length>0&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"var(--card)",borderRadius:12,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",zIndex:200,overflow:"hidden"}}>
            {suggestions.map((s,i)=>(
              <button key={i} onClick={()=>pickSuggestion(s)} style={{width:"100%",padding:"11px 14px",display:"flex",flexDirection:"column",alignItems:"flex-start",background:"transparent",border:"none",cursor:"pointer",borderTop:i>0?"0.5px solid var(--sep)":"none",textAlign:"left"}}>
                <span style={{fontSize:15,fontWeight:500,color:"var(--t1)"}}>{s.name}</span>
                {s.sub&&<span style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{s.sub}</span>}
              </button>
            ))}
          </div>
        )}

function timingLabel(pill,session){
  const scheds=pill?.schedules;
  if(scheds&&scheds.length){
    if(session){const match=scheds.find(s=>s.session===session);if(!match)return null;return TIMING_OPTIONS.find(o=>o.value===match.timing)?.label||null;}
    return scheds.map(s=>{const sess=s.session==="morning"?"Morning":s.session==="lunch"?"Lunch":"Evening";const tim=TIMING_OPTIONS.find(o=>o.value===s.timing)?.label;return tim?sess+" · "+tim:sess;}).join(", ");

  const v=pill?.timing;return v?TIMING_OPTIONS.find(o=>o.value===v)?.label||null:null;
}

function buildActivePillsForDate(date,pillList,archived){
  const pills=[];

function dayScore(log,list,archived,date){
  if(!log)return{pct:0,taken:0,total:0};
  const pills=date?buildActivePillsForDate(date,list,archived):[...(list.morning||[]).map(p=>({...p,session:"morning"})),...(list.lunch||[]).map(p=>({...p,session:"lunch"})),...(list.evening||[]).map(p=>({...p,session:"evening"}))];
  const t=pills.length,k=pills.filter(p=>log[p.session]?.[p.id]).length;

function getPillsForSession(pillList,key){
  const all=[...(pillList.morning||[]),...(pillList.lunch||[]),...(pillList.evening||[])];
  return all.filter(p=>{
    if(p.schedules&&p.schedules.length)return p.schedules.some(s=>s.session===key);
    return(p.sessions||[p.session]).includes(key);
  });
}

function asNeededStatus(timestamps,pill){
  const todayArr=todayOnlyTs(timestamps);
  const count=todayArr.length;
  const atMax=pill.maxDailyDose&&count>=pill.maxDailyDose;
  if(!timestamps.length)return{canTake:true,nextAllowedTs:null,count};
  const lastTs=timestamps[timestamps.length-1];
  const intervalMs=(pill.minIntervalHours||0)*3600000;
  const nextAllowedTs=intervalMs>0?lastTs+intervalMs:null;
  const intervalOk=!nextAllowedTs||Date.now()>=nextAllowedTs;
  return{canTake:!atMax&&intervalOk,nextAllowedTs,count};
}

function App(){
  const [view,setView]=useState("today");
  const [pillList,setPillList]=useState(null);
  const [archived,setArchived]=useState({morning:[],lunch:[],evening:[]});
  const [todayLog,setTodayLog]=useState(null);
  const [asNeededTs,setAsNeededTs]=useState({});
  const [history,setHistory]=useState([]);
  const [flash,setFlash]=useState(null);
  const [aiTips,setAiTips]=useState(null);
  const [tipsLoading,setTipsLoading]=useState(false);
  const [hasNewTips,setHasNewTips]=useState(false);
  const [nurseMsgs,setNurseMsgs]=useState([]);
  const [newTipLabels,setNewTipLabels]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("pr:newTipLabels")||"[]"));}catch{return new Set();}});
  const tipCardRefs=React.useRef({});
  const tipsRef=React.useRef(null);
  async function forceRefreshTips(){
    setAiTips(null);
    setTipsLoading(true);
    const allPills=[...(pillList.morning||[]),...(pillList.lunch||[]),...(pillList.evening||[]),...(pillList.as_needed||[])];
    if(allPills.length===0){setTipsLoading(false);return;}
    const pillsDesc=allPills.map(p=>{const doseStr=p.dosageAmt&&p.dosageUnit?`${p.dosageAmt}${p.dosageUnit}`:p.dose||"";return`- ${p.name}${doseStr?` (${doseStr})`:""}`+(p.asNeeded?" [as needed]":"")+(p.maxDailyDose?` max ${p.maxDailyDose}x/day`:"");}).join("\n");
    const hashKey="pr:tips:"+btoa(unescape(encodeURIComponent(pillsDesc))).slice(0,40);
    try{
      const res=await fetch(`${SUPA_URL}/functions/v1/get-tips`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SUPA_KEY},body:JSON.stringify({pillsDesc})});
      const tips=await res.json();
      if(Array.isArray(tips)){setAiTips(tips);await sbSet(hashKey,tips);const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=tips.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}}
    }catch(e){console.error(e);}
    setTipsLoading(false);
  }
  React.useEffect(()=>{
    if(newTipLabels.size===0)return;
    const observers=[];
    function markSeen(label){
      setNewTipLabels(prev=>{
        const next=new Set(prev);
        next.delete(label);
        const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");
        if(!seenRaw.includes(label))seenRaw.push(label);
        localStorage.setItem("pr:seenTipLabels",JSON.stringify(seenRaw));
        if(next.size===0)setHasNewTips(false);
        return next;
      });
    }
    function markAllSeen(){
      const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");
      for(const label of newTipLabels){if(!seenRaw.includes(label))seenRaw.push(label);}
      localStorage.setItem("pr:seenTipLabels",JSON.stringify(seenRaw));
      setNewTipLabels(new Set());
      setHasNewTips(false);
    }
    for(const label of newTipLabels){
      const el=tipCardRefs.current[label];
      if(!el)continue;
      const obs=new IntersectionObserver(([e])=>{
        if(e.isIntersecting){obs.disconnect();markSeen(label);}
      },{threshold:0.5});
      obs.observe(el);
      observers.push(obs);
    }
    function onScroll(){
      const nearBottom=window.scrollY+window.innerHeight>=document.documentElement.scrollHeight-60;
      if(nearBottom)markAllSeen();
    }
    window.addEventListener("scroll",onScroll,{passive:true});
    return()=>{observers.forEach(o=>o.disconnect());window.removeEventListener("scroll",onScroll);};
  },[newTipLabels]);
  const [loading,setLoading]=useState(true);
  const [loadError,setLoadError]=useState(false);
  const [selectedDay,setSelectedDay]=useState(null);
  const [installPrompt,setInstallPrompt]=useState(null);
  const [installed,setInstalled]=useState(false);
  const [detailSheet,setDetailSheet]=useState(null);
  const [missedDtStr,setMissedDtStr]=useState(null);
  const [addSheet,setAddSheet]=useState(null);
  const [profile,setProfile]=useState({name:"",age:"",weight:"",height:""});
  const [now,setNow]=useState(Date.now());
  const fileInputRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setNow(Date.now()),30000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const h=e=>{e.preventDefault();setInstallPrompt(e);};window.addEventListener("beforeinstallprompt",h);window.addEventListener("appinstalled",()=>{setInstalled(true);setInstallPrompt(null);});return()=>window.removeEventListener("beforeinstallprompt",h);},[]);

  const loadData=useCallback(async()=>{
    setLoadError(false);setLoading(true);
    try{
      let list=await sbGet(PILL_LIST_KEY)||DEFAULT_PILLS;
      if(list.night&&!list.evening){list={...list,evening:list.night,lunch:list.lunch||[]};delete list.night;}
      if(!list.lunch)list={...list,lunch:[]};
      if(!list.as_needed)list={...list,as_needed:[]};
      const archResult=await archiveExpired(list);list=archResult.list;
      for(const sess of["morning","lunch","evening"]){list[sess]=(list[sess]||[]).map(p=>{if(p.schedules)return p;const sessions=p.sessions||(p.session&&p.session!=="as_needed"?[p.session]:[sess]);const timings=p.timings||(p.timing?[p.timing]:[]);return{...p,schedules:sessions.map((s,i)=>({session:s,timing:timings[i]||""})),sessions};});}
      setPillList(list);
      if(archResult.changed){setAiTips(null);}
      generateTips(list);
      const arch=await sbGet(ARCHIVED_KEY)||{morning:[],lunch:[],evening:[]};
      if(arch.night&&!arch.evening){arch.evening=arch.night;delete arch.night;}if(!arch.lunch)arch.lunch=[];
      setArchived(arch);
      const prof=await sbGet(PROFILE_KEY)||{name:"",age:"",weight:"",height:""};setProfile(prof);
      const today=todayStr();let log=await sbGet(dayKey(today));
      if(!log){log=buildEmptyLog(list);await sbSet(dayKey(today),log);}
      setTodayLog(log);
      const tsToday=await sbGet(asNeededDayKey(today))||{};
      const yesterday=addDays(today,-1);
      const tsYesterday=await sbGet(asNeededDayKey(yesterday))||{};
      const cutoff=Date.now()-24*3600000;
      const tsMerged={...tsToday};
      for(const[id,arr] of Object.entries(tsYesterday)){
        const recent=(arr||[]).filter(t=>t>cutoff);
        if(recent.length>0)tsMerged[id]=[...recent,...(tsMerged[id]||[])].sort((a,b)=>a-b);
      }
      const tsClean={};for(const[id,arr] of Object.entries(tsMerged)){tsClean[id]=[...new Set(arr||[])].sort((a,b)=>a-b);}
      setAsNeededTs(tsClean);
    }catch(e){
      console.warn("load failed",e);
      setLoadError(true);
    }finally{
      setLoading(false);
    }
  },[]);

  useEffect(()=>{
    if(!USER_TOKEN){setLoading(false);return;}
    loadData();
  },[]);

  function buildEmptyLog(list){
    const m={},l={},e={};
    const allPills=[...(list.morning||[]),...(list.lunch||[]),...(list.evening||[])];

  async function generateTips(list){
    const allPills=[...(list.morning||[]),...(list.lunch||[]),...(list.evening||[]),...(list.as_needed||[])];
    if(allPills.length===0){setAiTips([]);return;}
    const pillsDesc=allPills.map(p=>{
      const doseStr=p.dosageAmt&&p.dosageUnit?`${p.dosageAmt}${p.dosageUnit}`:p.dose||"";
      return `- ${p.name}${doseStr?` (${doseStr})`:""}`+
        (p.asNeeded?" [as needed]":"")+
        (p.maxDailyDose?` max ${p.maxDailyDose}x/day`:"");
    }).join("\n");
    const hashKey="pr:tips:"+btoa(unescape(encodeURIComponent(pillsDesc))).slice(0,40);
    try{
      const cached=await sbGet(hashKey);
      if(cached&&Array.isArray(cached)){const activeNames=allPills.map(p=>p.name.toLowerCase());const filtered=cached.filter(t=>t.label.toLowerCase()==="interactions"||activeNames.some(n=>t.label.toLowerCase().includes(n)||n.includes(t.label.toLowerCase())));if(filtered.length!==cached.length){await sbSet(hashKey,filtered);}setAiTips(filtered);const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=filtered.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}else{setHasNewTips(false);}setTipsLoading(false);return;}
    }catch{}

    try{

        method:"POST",

        body:JSON.stringify({pillsDesc})

      if(Array.isArray(tips)){
        setAiTips(tips);
        const seenRaw=JSON.parse(localStorage.getItem("pr:seenTipLabels")||"[]");const newLabels=tips.map(t=>t.label).filter(l=>!seenRaw.includes(l));if(newLabels.length>0){setNewTipLabels(new Set(newLabels));setHasNewTips(true);}else{setHasNewTips(false);}
        await sbSet(hashKey,tips);

    }catch(e){console.error("Tips error",e);setAiTips([]);}

                <div style={{background:"var(--card)",borderRadius:14,padding:"18px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,0.07)"}}>
                  <div style={{width:18,height:18,flexShrink:0,border:"2.5px solid var(--sep)",borderTopColor:"var(--acc)",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
                  <span style={{fontSize:14,color:"var(--t2)",fontWeight:500}}>Generating personalized recommendations…</span>
                </div>
              )}
              {!tipsLoading&&(!aiTips||aiTips.length===0)?(
                <div style={{background:"var(--card)",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",padding:"32px 24px",display:"flex",flexDirection:"column",alignItems:"center",gap:16,textAlign:"center"}}>
                  <div style={{width:52,height:52,borderRadius:14,background:"var(--acc-soft)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--acc)"}}><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></div>
                  <div><div style={{fontSize:16,fontWeight:600,color:"var(--t1)",marginBottom:4}}>No alerts</div><div style={{fontSize:14,color:"var(--t2)"}}>Add a medication to see personalized recommendations.</div></div>
                </div>
              ):(aiTips||[]).map((tip,ti)=>{
                const col=colorMap[tip.colorKey]||"var(--acc)";
                const isNew=newTipLabels.has(tip.label);
                return(
                <div key={ti} ref={el=>{if(el)tipCardRefs.current[tip.label]=el;else delete tipCardRefs.current[tip.label];}} style={{background:"var(--card)",borderRadius:14,overflow:"hidden",marginBottom:12,boxShadow:isNew?"0 1px 8px rgba(0,102,232,0.15)":"0 1px 3px rgba(0,0,0,0.07)",transition:"box-shadow 0.3s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"13px 16px",borderBottom:"0.5px solid var(--sep-strong)"}}>
                    <span style={{fontSize:15,fontWeight:600,color:"var(--t1)",flex:1}}>{tip.label}</span>
                    {isNew&&<span style={{fontSize:11,fontWeight:700,color:"var(--blue)",background:"rgba(0,102,232,0.1)",borderRadius:6,padding:"2px 7px",letterSpacing:"0.04em",textTransform:"uppercase"}}>New</span>}
                  </div>
                  {(tip.points||[]).map((pt,i)=>(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px"}}><span style={{flexShrink:0,display:"flex",alignItems:"center",color:"var(--t2)",marginTop:2}}><TipIcon name={pt.icon} size={18}/></span><p style={{margin:0,fontSize:14,lineHeight:1.6,color:"var(--t2)",fontWeight:500}}>{pt.text}</p></div>))}
                  <div style={{padding:"10px 16px",borderTop:"0.5px solid var(--sep-strong)"}}><p style={{margin:0,fontSize:11,color:"var(--t3)",fontStyle:"italic"}}>Always follow your doctor's instructions. This is general information only.</p></div>
                </div>
              );})}
            </div>);
          })()}
          <div style={{textAlign:"center",fontSize:12,color:"var(--t3)",paddingTop:16,paddingBottom:12,letterSpacing:"0.02em"}} className="safe-bottom">Synced to cloud · Resets at midnight</div>
        </div>
      </div>
    </div>

    {(hasNewTips||tipsLoading)&&(()=>{const ready=hasNewTips&&!tipsLoading;return(<button onClick={ready?()=>{const firstNewLabel=[...newTipLabels][0];const el=firstNewLabel&&tipCardRefs.current[firstNewLabel];(el||tipsRef.current)&&(el||tipsRef.current).scrollIntoView({behavior:"smooth",block:"center"});}:null} style={{position:"fixed",bottom:"calc(80px + env(safe-area-inset-bottom,0px))",left:"50%",transform:"translateX(-50%)",zIndex:490,background:ready?"var(--acc)":"#888",color:"#fff",border:"none",borderRadius:20,padding:"9px 18px",fontSize:13,fontWeight:600,boxShadow:ready?"0 4px 16px rgba(200,121,65,0.35)":"0 4px 16px rgba(0,0,0,0.2)",cursor:ready?"pointer":"default",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap",transition:"background 0.3s"}}>{ready?<span>↓</span>:<div style={{width:13,height:13,border:"2px solid rgba(255,255,255,0.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:0}}/>}<span>New recommendations</span></button>);})()}
    <TabBar view={view} setView={setView} setSelectedDay={setSelectedDay} hasNewTips={hasNewTips}/>

    {addSheet&&(<BottomSheet onClose={()=>setAddSheet(null)}>
      <div style={{padding:"4px 20px 12px"}}><div style={{fontSize:18,fontWeight:700,color:"var(--t1)"}}>Add medication</div></div>
      <div style={{borderTop:"0.5px solid var(--sep)"}}>
        <PillForm initial={{session:addSheet.session,asNeeded:false}} accent="var(--acc)" defaultSession={addSheet.session} submitLabel="Add" noAutoFocus={true} onSave={data=>addPill(addSheet.session,data)} onCancel={()=>setAddSheet(null)}/>
      </div>
    </BottomSheet>)}

    {detailSheet&&(<BottomSheet onClose={()=>{setDetailSheet(null);setMissedDtStr(null);}}>
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"4px 20px 16px"}}>
        <div style={{width:52,height:52,borderRadius:14,flexShrink:0,background:"var(--sep)",display:"flex",alignItems:"center",justifyContent:"center"}}><ShapeIcon shape={detailSheet.pill.shape} size={28} color="var(--t2)"/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:20,fontWeight:700,color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{detailSheet.pill.name}</div>
          <div style={{fontSize:14,color:"var(--t2)",marginTop:2}}>{detailSheet.pill.dose}</div>
        </div>
        <button onClick={()=>{deletePill(detailSheet.session,detailSheet.pill.id);setDetailSheet(null);}} style={{width:36,height:36,borderRadius:10,flexShrink:0,border:"none",cursor:"pointer",background:"rgba(255,59,48,0.10)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--red)"}}><IconTrash/></button>
      </div>
      {detailSheet.session==="as_needed"&&(()=>{
        const pid=detailSheet.pill.id;
        const timestamps=asNeededTs[pid]||[];
        const displayTs=todayOnlyTs(timestamps);
        async function updateTimestamps(newTs){
          const sorted=[...new Set(newTs)].sort((a,b)=>a-b);
          const newAsNeededTs={...asNeededTs,[pid]:sorted};
          setAsNeededTs(newAsNeededTs);
          await sbSet(asNeededDayKey(todayStr()),cleanMapToday(newAsNeededTs));
          const newLog={...todayLog,as_needed:cleanMapToday({...todayLog.as_needed,[pid]:sorted})};
          setTodayLog(newLog);await sbSet(dayKey(todayStr()),newLog);
        }
        async function addMissedDose(dtStr){
          const ts=new Date(dtStr).getTime();if(isNaN(ts))return;
          const dateStr=dtStr.split("T")[0];const today=todayStr();
          const newArr=[...new Set([...timestamps,ts])].sort((a,b)=>a-b);
          const newAsNeededTs={...asNeededTs,[pid]:newArr};
          setAsNeededTs(newAsNeededTs);setMissedDtStr(null);
          if(dateStr===today){
            await sbSet(asNeededDayKey(today),cleanMapToday(newAsNeededTs));
            const newLog={...todayLog,as_needed:cleanMapToday({...todayLog.as_needed,[pid]:newArr})};
            setTodayLog(newLog);await sbSet(dayKey(today),newLog);
          } else {
            const dayTs=await sbGet(asNeededDayKey(dateStr))||{};
            const dayArr=[...new Set([...(dayTs[pid]||[]),ts])].sort((a,b)=>a-b);
            await sbSet(asNeededDayKey(dateStr),{...dayTs,[pid]:dayArr});
            await sbSet(asNeededDayKey(today),cleanMapToday(newAsNeededTs));
          }
        }
        function tsToTimeInput(ts){const d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
        function timeInputToTs(val,refTs){const[h,m]=val.split(":").map(Number);const d=new Date(refTs||Date.now());d.setHours(h,m,0,0);return d.getTime();}
        function nowDtl(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
        function minDtl(){const d=new Date(startOfTodayTs()-1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T00:00";}
        return(<div style={{borderTop:"0.5px solid var(--sep)",padding:"16px 20px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--t2)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Today's doses</div>
          <div style={{background:"var(--card)",borderRadius:12,overflow:"hidden",boxShadow:"var(--shadow-sm)"}}>
            {displayTs.length===0&&(
              <div style={{padding:"13px 16px",color:"var(--t3)",fontSize:14,fontStyle:"italic"}}>No doses logged today</div>
            )}
            {displayTs.map((ts,i)=>{const ordinals=["1st","2nd","3rd","4th","5th","6th","7th","8th"];const ord=ordinals[i]||(i+1)+"th";return(
              <div key={ts+"-"+i} style={{position:"relative"}}>
                {i>0&&<div style={{position:"absolute",top:0,left:16,right:0,height:"0.5px",background:"var(--sep)"}}/>}
                <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px"}}>
                  <span style={{fontSize:13,fontWeight:500,color:"var(--t2)",minWidth:52}}>{ord} dose</span>
                  <input type="time" defaultValue={tsToTimeInput(ts)}
                    onBlur={e=>{const newVal=e.target.value;if(!newVal)return;const idx=timestamps.indexOf(ts);const newTs=[...timestamps];newTs[idx]=timeInputToTs(newVal,ts);updateTimestamps(newTs);}}
                    style={{flex:1,border:"none",background:"transparent",color:"var(--blue)",fontSize:15,fontWeight:500,cursor:"pointer",padding:0}}/>
                  <button onClick={()=>{const idx=timestamps.indexOf(ts);updateTimestamps([...timestamps.slice(0,idx),...timestamps.slice(idx+1)]);}}
                    style={{width:28,height:28,borderRadius:8,background:"rgba(229,52,44,0.10)",border:"none",color:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
                  </button>
                </div>
              </div>
            );})}
            <div style={{position:"relative"}}>
              {displayTs.length>0&&<div style={{position:"absolute",top:0,left:16,right:0,height:"0.5px",background:"var(--sep)"}}/>}
              {missedDtStr!==null
                ?(<div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
                    <input type="datetime-local" value={missedDtStr} min={minDtl()} max={nowDtl()}
                      onChange={e=>setMissedDtStr(e.target.value)}
                      style={{fontSize:15,color:"var(--t1)",background:"var(--bg2)",border:"0.5px solid var(--sep)",borderRadius:10,padding:"10px 12px",width:"100%",boxSizing:"border-box"}}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setMissedDtStr(null)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--sep)",color:"var(--t2)",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cancel</button>
                      <button onClick={()=>addMissedDose(missedDtStr)} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:"var(--acc)",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Add dose</button>
                    </div>
                  </div>)
                :(<button onClick={()=>setMissedDtStr(nowDtl())} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"11px 16px",background:"transparent",border:"none",color:"var(--acc)",fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left"}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"/></svg>
                    Add missed dose
                  </button>)
              }
            </div>
          </div>
        </div>);
      })()}
      <div style={{borderTop:"0.5px solid var(--sep)"}}>
        <PillForm initial={detailSheet.pill} accent={detailSheet.accent} submitLabel="Save" noAutoFocus={true}
          onSave={async(data)=>{
            const id=detailSheet.pill.id;
            const{schedules:newSchedules=[],sessions:newSessions,...rest}=data;
            let newList={...pillList};
            if(detailSheet.session==="as_needed"){
              const updatedPill={...detailSheet.pill,...rest,schedules:[],sessions:["as_needed"]};
              newList={...pillList,as_needed:(pillList.as_needed||[]).map(p=>p.id===id?updatedPill:p)};
              setPillList(newList);await sbSet(PILL_LIST_KEY,newList);setDetailSheet(null);return;
            }
            const oldSchedules=detailSheet.pill.schedules||[{session:detailSheet.session,timing:""}];
            const oldSessions=oldSchedules.map(s=>s.session);
            const newSessList=newSchedules.map(s=>s.session);
            let primarySess=oldSessions[0];
            for(const s of["morning","lunch","evening"]){if((pillList[s]||[]).find(p=>p.id===id)){primarySess=s;break;}}
            const newPrimarySess=newSessList[0]||primarySess;
            const updatedPill={...detailSheet.pill,...rest,schedules:newSchedules,sessions:newSessList};
            if(newPrimarySess!==primarySess){newList[primarySess]=(newList[primarySess]||[]).filter(p=>p.id!==id);newList[newPrimarySess]=[...(newList[newPrimarySess]||[]),updatedPill];}
            else{newList[primarySess]=(newList[primarySess]||[]).map(p=>p.id===id?updatedPill:p);}
            let newLog={...todayLog};
            for(const s of oldSessions){if(!newSessList.includes(s)&&newLog[s]){newLog={...newLog,[s]:{...newLog[s]}};delete newLog[s][id];}}
            for(const s of newSessList){if(!oldSessions.includes(s)&&s!=="as_needed"){newLog={...newLog,[s]:{...newLog[s],[id]:false}};}}
            setTodayLog(newLog);await sbSet(dayKey(todayStr()),newLog);
            setPillList(newList);await sbSet(PILL_LIST_KEY,newList);setDetailSheet(null);
          }}
          onCancel={()=>setDetailSheet(null)}
        />
      </div>
    </BottomSheet>)}
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if("serviceWorker"in navigator){
  const sw='const C="pr-v111",A=[self.location.pathname];self.addEventListener("install",e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(A)));self.skipWaiting();});self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener("fetch",e=>{if(e.request.url.includes("supabase.co")){e.respondWith(fetch(e.request));return;}e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;})));});';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"})),{scope:"./"}).catch(e=>console.warn(e));
}
</script>
</body>
</html>
